name: homestay_app
description: "Homestay Management App - Full Featured Flutter Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  local_auth: ^2.1.6
  get: ^4.6.6
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  signalr_netcore: ^1.3.3
  # Real-time & WebRTC for calls
  # Use a newer major version that includes Android embedding v2 support
  flutter_webrtc: ^1.2.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.1.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  
  # Date & Time
  intl: any
  table_calendar: ^3.0.9
  
  # Images
  image_picker: ^1.0.7
  
  # URL Launcher
  url_launcher: ^6.2.4
  
  # Payments
  webview_flutter: ^4.5.0
  
  # Utils
  flutter_svg: ^2.0.9
  path_provider: ^2.1.2
  share_plus: ^12.0.0
  fl_chart: ^1.1.1
  flutter_tts: ^3.6.3
  speech_to_text: ^7.3.0
  google_mlkit_translation: ^0.13.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.10.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env
    - assets/icons/
    - assets/animations/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#667eea"
  adaptive_icon_foreground: "assets/icons/logo.png"

dependency_overrides:
  google_mlkit_commons: ^0.11.0
